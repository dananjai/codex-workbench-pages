<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex Workbench Pages</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f9fc;
      --panel: #ffffff;
      --ink: #182033;
      --muted: #667085;
      --line: #d7dde8;
      --blue: #2563eb;
      --shadow: 0 14px 34px rgba(24, 32, 51, 0.11);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Yu Gothic UI", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
    }

    main {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    header {
      margin-bottom: 28px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .lead {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }

    .card {
      display: block;
      min-height: 150px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: inherit;
      text-decoration: none;
      box-shadow: var(--shadow);
    }

    .card:hover {
      border-color: rgba(37, 99, 235, 0.45);
      transform: translateY(-1px);
    }

    .tag {
      display: inline-flex;
      margin-bottom: 14px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #edf6ff;
      color: var(--blue);
      font-size: 12px;
      font-weight: 700;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .description {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    footer {
      margin-top: 28px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Codex Workbench Pages</h1>
      <p class="lead">Codex workbenchで作った、Web公開向けの静的成果物置き場です。公開対象はこのリポジトリ内の静的ファイルだけです。</p>
    </header>

    <section class="grid" aria-label="公開成果物">
      <a class="card" href="./rigid-body-simulation/">
        <span class="tag">physics</span>
        <h2>剛体の運動シミュレーション</h2>
        <p class="description">力ベクトル、固定点、合力、合モーメントを操作して、剛体の並進運動と回転運動を確認できます。</p>
      </a>
    </section>

    <footer>
      新しい成果物は専用ディレクトリを作り、このトップページからリンクします。
    </footer>
  </main>
</body>
</html>
